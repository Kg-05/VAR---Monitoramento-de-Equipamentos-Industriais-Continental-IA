<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipamentos - VAR Monitoramento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/index.html">📊 VAR Monitoramento</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" data-page="usuarios" href="#">Usuários</a></li>
          <li class="nav-item"><a class="nav-link" data-page="empresas" href="#">Empresas</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Equipamentos</a></li>
          <li class="nav-item"><a class="nav-link" data-page="alertas" href="#">Alertas</a></li>
          <li class="nav-item"><a class="nav-link" id="logoutBtn" href="#">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div data-notifications class="container mt-3"></div>

  <div class="container main-container">
    <div class="row mb-4">
      <div class="col-12">
        <h1>⚙️ Gerenciar Equipamentos</h1>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-12">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#equipamentoModal">+ Novo Equipamento</button>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h5>Lista de Equipamentos</h5>
          </div>
          <div class="card-body">
            <table class="table" id="equipamentosTable">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Modelo</th>
                  <th>Localização</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr><td colspan="5" class="text-center text-muted">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="equipamentoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Novo Equipamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="equipamentoForm">
            <div class="mb-3">
              <label for="nomeEquipamento" class="form-label">Nome</label>
              <input type="text" class="form-control" id="nomeEquipamento" required>
            </div>
            <div class="mb-3">
              <label for="modeloEquipamento" class="form-label">Modelo</label>
              <input type="text" class="form-control" id="modeloEquipamento">
            </div>
            <div class="mb-3">
              <label for="numeroSerieEquipamento" class="form-label">Número de Série</label>
              <input type="text" class="form-control" id="numeroSerieEquipamento">
            </div>
            <div class="mb-3">
              <label for="localizacaoEquipamento" class="form-label">Localização</label>
              <input type="text" class="form-control" id="localizacaoEquipamento">
            </div>
            <div class="mb-3">
              <label for="statusEquipamento" class="form-label">Status</label>
              <select class="form-control" id="statusEquipamento">
                <option value="OPERACIONAL">Operacional</option>
                <option value="MANUTENCAO">Manutenção</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="salvarEquipamentoBtn">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 VAR - Plataforma de Monitoramento | KG KITUXI TECH</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function loadEquipamentos() {
      try {
        const data = await equipamentos.listar();
        const tbody = document.querySelector('#equipamentosTable tbody');
        tbody.innerHTML = '';

        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Nenhum equipamento</td></tr>';
          return;
        }

        data.forEach(eq => {
          tbody.innerHTML += `
            <tr>
              <td>${eq.nome}</td>
              <td>${eq.modelo || 'N/A'}</td>
              <td>${eq.localizacao || 'N/A'}</td>
              <td><span class="badge ${eq.status === 'OPERACIONAL' ? 'bg-success' : 'bg-warning'}">${eq.status}</span></td>
              <td>
                <button class="btn btn-sm btn-warning">Editar</button>
                <button class="btn btn-sm btn-danger" onclick="deletarEquipamento('${eq.id}')">Deletar</button>
              </td>
            </tr>
          `;
        });
      } catch (error) {
        showError(error);
      }
    }

    document.getElementById('salvarEquipamentoBtn').addEventListener('click', async () => {
      const nome = document.getElementById('nomeEquipamento').value;
      const modelo = document.getElementById('modeloEquipamento').value;
      const numeroSerie = document.getElementById('numeroSerieEquipamento').value;
      const localizacao = document.getElementById('localizacaoEquipamento').value;
      const status = document.getElementById('statusEquipamento').value;

      try {
        await equipamentos.criar({ nome, modelo, numeroSerie, localizacao, status });
        showNotification('Equipamento criado!', 'success');
        bootstrap.Modal.getInstance(document.getElementById('equipamentoModal')).hide();
        loadEquipamentos();
      } catch (error) {
        showError(error);
      }
    });

    async function deletarEquipamento(id) {
      if (confirm('Deletar equipamento?')) {
        try {
          await equipamentos.deletar(id);
          showNotification('Equipamento deletado', 'success');
          loadEquipamentos();
        } catch (error) {
          showError(error);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', loadEquipamentos);
  </script>
</body>
</html>
