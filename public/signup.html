<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - VAR Monitoramento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box" style="max-width: 450px;">
      <h2>📝 Criar Conta</h2>
      <p class="text-muted text-center mb-4">Plataforma de Monitoramento de Equipamentos</p>
      
      <form id="signupForm">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome Completo</label>
          <input type="text" class="form-control" id="nome" name="nome" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senha" name="senha" required>
          <small class="form-text text-muted">Mínimo 6 caracteres</small>
        </div>

        <div class="mb-3">
          <label for="senhaConfirm" class="form-label">Confirmar Senha</label>
          <input type="password" class="form-control" id="senhaConfirm" name="senhaConfirm" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
      </form>

      <div id="signupError" class="alert alert-danger mt-3" style="display: none;"></div>
      <div id="signupSuccess" class="alert alert-success mt-3" style="display: none;"></div>

      <div class="text-center mt-4">
        <p class="text-muted">Já tem conta? <a href="/login.html" class="text-decoration-none">Faça login aqui</a></p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const senhaConfirm = document.getElementById('senhaConfirm').value;
      const errorDiv = document.getElementById('signupError');
      const successDiv = document.getElementById('signupSuccess');

      // Limpar mensagens anteriores
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      // Validações
      if (senha.length < 6) {
        errorDiv.textContent = 'Senha deve ter no mínimo 6 caracteres';
        errorDiv.style.display = 'block';
        return;
      }

      if (senha !== senhaConfirm) {
        errorDiv.textContent = 'As senhas não conferem';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        const response = await auth.registro(nome, email, senha);
        
        successDiv.textContent = 'Conta criada com sucesso! Redirecionando para login...';
        successDiv.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);
      } catch (error) {
        errorDiv.textContent = error.message || 'Erro ao criar conta';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
