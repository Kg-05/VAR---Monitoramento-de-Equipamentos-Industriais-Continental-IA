<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VAR Monitoramento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-box">
      <!-- Logo SVG -->
      <div class="login-logo mb-4">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
      </div>

      <h1 class="login-title">VAR Monitoramento</h1>
      <p class="login-subtitle">Plataforma de Monitoramento de Equipamentos</p>
      
      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control login-input" id="email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control login-input" id="senha" name="senha" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100 mb-3">Entrar</button>
      </form>

      <div id="loginError" class="alert alert-danger alert-login mt-3" style="display: none;"></div>

      <hr class="my-3" style="border-color: rgba(255,255,255,0.1);">

      <div class="text-center mt-4">
        <p class="login-text-small">Não tem conta? <a href="/signup.html" class="login-link\">Crie uma aqui</a></p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const errorDiv = document.getElementById('loginError');

      try {
        await auth.login(email, senha);
        window.location.href = '/index.html';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
