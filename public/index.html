<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - VAR Monitoramento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/index.html">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display: inline; margin-right: 8px;">
          <rect x="2" y="2" width="5" height="5" fill="#4285F4"/>
          <rect x="9" y="2" width="5" height="5" fill="#EA4335"/>
          <rect x="16" y="2" width="5" height="5" fill="#FBBC04"/>
          <rect x="2" y="9" width="5" height="5" fill="#34A853"/>
          <rect x="9" y="9" width="5" height="5" fill="#4285F4"/>
          <rect x="16" y="9" width="5" height="5" fill="#EA4335"/>
        </svg>
        VAR Monitoramento
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="usuarios" href="#">Usuários</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="empresas" href="#">Empresas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="equipamentos" href="#">Equipamentos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="alertas" href="#">Alertas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" id="logoutBtn" href="#">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Notificações -->
  <div data-notifications class="container mt-3"></div>

  <!-- Conteúdo Principal -->
  <div class="container main-container">
    <div class="row">
      <div class="col-12">
        <h1 class="mb-4">Dashboard</h1>
      </div>
    </div>

    <!-- Cards de Resumo -->
    <div class="row mb-4">
      <div class="col-lg-3 col-md-6 mb-3">
        <div class="card dashboard-card metric-card">
          <div class="metric-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <div class="metric-content">
            <h3 id="totalUsuarios" class="metric-value">0</h3>
            <p class="metric-label">Usuários</p>
          </div>
        </div>
      </div>
      <div class="col-lg-3 col-md-6 mb-3">
        <div class="card dashboard-card metric-card">
          <div class="metric-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
            </svg>
          </div>
          <div class="metric-content">
            <h3 id="totalEmpresas" class="metric-value">0</h3>
            <p class="metric-label">Empresas</p>
          </div>
        </div>
      </div>
      <div class="col-lg-3 col-md-6 mb-3">
        <div class="card dashboard-card metric-card">
          <div class="metric-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54h3.04l4.12-5.65h-2.76l.35-.59z"/>
            </svg>
          </div>
          <div class="metric-content">
            <h3 id="totalEquipamentos" class="metric-value">0</h3>
            <p class="metric-label">Equipamentos</p>
          </div>
        </div>
      </div>
      <div class="col-lg-3 col-md-6 mb-3">
        <div class="card dashboard-card metric-card">
          <div class="metric-icon" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
              <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
            </svg>
          </div>
          <div class="metric-content">
            <h3 id="totalAlertas" class="metric-value">0</h3>
            <p class="metric-label">Alertas</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Alertas Recentes -->
    <div class="row">
      <div class="col-md-12">
        <div class="card alerts-card">
          <div class="card-header d-flex align-items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
            </svg>
            <h5 class="mb-0">Alertas Recentes</h5>
          </div>
          <div class="card-body">
            <table class="table" id="alertasTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Mensagem</th>
                  <th>Severidade</th>
                  <th>Data</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="5" class="text-center text-muted">Carregando...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 VAR - Plataforma de Monitoramento | KG KITUXI TECH</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Carregar dados do dashboard
    async function loadDashboard() {
      try {
        const [usuariosData, empresasData, equipamentosData, alertasData] = await Promise.all([
          usuarios.listar(),
          empresas.listar(),
          equipamentos.listar(),
          alertas.listar(),
        ]);

        document.getElementById('totalUsuarios').textContent = usuariosData.length || 0;
        document.getElementById('totalEmpresas').textContent = empresasData.length || 0;
        document.getElementById('totalEquipamentos').textContent = equipamentosData.length || 0;
        document.getElementById('totalAlertas').textContent = alertasData.length || 0;

        // Exibir alertas recentes (últimos 5)
        const alertasRecentes = alertasData.slice(0, 5);
        const tbody = document.querySelector('#alertasTable tbody');
        tbody.innerHTML = '';

        if (alertasRecentes.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Nenhum alerta</td></tr>';
        } else {
          alertasRecentes.forEach(alerta => {
            tbody.innerHTML += `
              <tr>
                <td>${alerta.id.substring(0, 8)}</td>
                <td>${alerta.mensagem || 'N/A'}</td>
                <td><span class="badge bg-${alerta.severidade === 'ALTO' ? 'danger' : alerta.severidade === 'MEDIO' ? 'warning' : 'info'}">${alerta.severidade}</span></td>
                <td>${formatDate(alerta.criadoEm)}</td>
                <td><span class="badge ${alerta.reconhecido ? 'bg-success' : 'bg-secondary'}">${alerta.reconhecido ? 'Reconhecido' : 'Pendente'}</span></td>
              </tr>
            `;
          });
        }
      } catch (error) {
        showError(error);
      }
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>
